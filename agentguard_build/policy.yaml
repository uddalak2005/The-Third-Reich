#Global settings 
global:
  enabled: true
  default_policy: "trusted"        
  http_inspection: true
  log_allowed: false               
  alert_webhook: ""               

#Policy definitions 
policies:
  - id: 1
    name: "restricted"
    allowed_ports:
      - 443      
      - 8443     
    max_bytes_per_sec: 1048576     
    max_connections: 20
    max_new_conns_per_sec: 5
    allow_exec: false
    allow_fork: false
    allow_ptrace: false
    allow_raw_sockets: false
    allow_bind: false
    allow_external_net: false      
    inspect_http: true
    block_on_injection: true       

  - id: 2
    name: "internal"
    allowed_ports:
      - 80       # HTTP
      - 443      # HTTPS
      - 5432     # PostgreSQL
      - 6379     # Redis
      - 8080     # Internal API
      - 8443     # Internal API (TLS)
      - 9200     # Elasticsearch
    max_bytes_per_sec: 10485760   
    max_connections: 100
    max_new_conns_per_sec: 20
    allow_exec: false
    allow_fork: false
    allow_ptrace: false
    allow_raw_sockets: false
    allow_bind: false
    allow_external_net: false
    inspect_http: true
    block_on_injection: true

  - id: 3
    name: "trusted"
    allowed_ports:
      - 80
      - 443
      - 587      # SMTP (email sending)
      - 993      # IMAPS
      - 5432
      - 6379
      - 8080
      - 8443
      - 9200
      - 11434    # Ollama local LLM
    max_bytes_per_sec: 104857600   # 100 MB/s
    max_connections: 500
    max_new_conns_per_sec: 100
    allow_exec: false              # still no exec — agents don't need it
    allow_fork: false
    allow_ptrace: false
    allow_raw_sockets: false
    allow_bind: false
    allow_external_net: true       # can reach internet
    inspect_http: true
    block_on_injection: true       # block injection attempts on all policies

  - id: 4
    name: "quarantine"
    allowed_ports: []              
    max_bytes_per_sec: 0
    max_connections: 0
    max_new_conns_per_sec: 0
    allow_exec: false
    allow_fork: false
    allow_ptrace: false
    allow_raw_sockets: false
    allow_bind: false
    allow_external_net: false
    inspect_http: true
    block_on_injection: true

#Agent definitions 
agents:

  # Python-based LangChain / LangGraph agents
  - name: "langchain-agent"
    process_name: "python3"
    cmdline_contains: "langchain"
    policy: "restricted"

  - name: "langgraph-agent"
    process_name: "python3"
    cmdline_contains: "langgraph"
    policy: "internal"

  # Node.js agents (LangChainJS, Vercel AI SDK, etc.)
  - name: "node-ai-agent"
    process_name: "node"
    cmdline_contains: "agent"
    policy: "internal"

  # OpenAI Assistants / Swarm framework
  - name: "openai-assistant"
    process_name: "python3"
    cmdline_contains: "openai"
    policy: "trusted"

  # AutoGen (Microsoft)
  - name: "autogen-agent"
    process_name: "python3"
    cmdline_contains: "autogen"
    policy: "restricted"

  # CrewAI
  - name: "crewai-agent"
    process_name: "python3"
    cmdline_contains: "crewai"
    policy: "internal"

  # Claude Code (Anthropic) — needs exec to run terminal commands
  # Note: exec allowed but still inspected
  - name: "claude-code"
    process_name: "node"
    cmdline_contains: "claude"
    policy: "trusted"

  # Generic "agent.py" catch-all
  - name: "generic-python-agent"
    process_name: "python3"
    cmdline_contains: "agent.py"
    policy: "restricted"

#Threat intelligence 
threat_intel:
  blocked_ips:
    # Tor exit node ranges
    - "185.220.101.0/24"
    - "185.220.102.0/23"
    - "199.87.154.0/24"
    # Common cryptominer pool IPs
    - "107.189.10.0/24"
    # block all traffic to a specific C2 IP
    # - "1.2.3.4/32"