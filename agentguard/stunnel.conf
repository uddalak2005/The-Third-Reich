# AgentGuard Stunnel Configuration
# ===================================
# Wraps the AgentGuard API in a TLS tunnel so the verify
# endpoint is protected against MITM at the network level.
#
# Your side (server):   runs stunnel in server mode
# Friend's side (client): runs stunnel in client mode
#
# Combined with HMAC response signing this gives:
#   Layer 1 — stunnel TLS:    channel encrypted + cert pinned
#   Layer 2 — HMAC signature: verdict tamper-proof at app level
#
# ── YOUR SIDE (server) ──────────────────────────────────────
# Save as: /etc/stunnel/agentguard-server.conf
# Run:     stunnel agentguard-server.conf

[agentguard-verify]
accept  = 0.0.0.0:8443          ; friend connects here
connect = 127.0.0.1:8080        ; forwards to AgentGuard API
cert    = /app/certs/agentguard-ca.crt
key     = /app/certs/agentguard-ca.key
; Only allow connections that present the shared client cert
verify  = 2
CAfile  = /app/certs/agentguard-ca.crt

# ── FRIEND'S SIDE (client) ──────────────────────────────────
# Save as: stunnel-client.conf on friend's machine
# Run:     stunnel stunnel-client.conf

# [agentguard-client]
# client  = yes
# accept  = 127.0.0.1:8444     ; friend's code connects here
# connect = YOUR_IP:8443        ; your stunnel server
# CAfile  = agentguard-ca.crt  ; your CA cert (you send this file)
# verify  = 2                   ; reject any other cert
